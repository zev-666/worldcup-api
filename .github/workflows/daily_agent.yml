name: Daily Agent

on:
  schedule:
    - cron: '0 2 * * *'   # 每天 UTC 02:00 = 台北時間 10:00
  workflow_dispatch:        # 允許手動觸發

jobs:
  run-agent:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          pip install langgraph httpx supabase

      - name: Run daily agent
        env:
          SUPABASE_URL:       ${{ secrets.SUPABASE_URL }}
          SUPABASE_KEY:       ${{ secrets.SUPABASE_KEY }}
          INTERNAL_API_TOKEN: ${{ secrets.INTERNAL_API_TOKEN }}
          API_ENDPOINT:       https://worldcup-api-jryd.onrender.com
        run: |
          python scripts/run_agent.py --task scrape_daily --date $(date +%Y-%m-%d)